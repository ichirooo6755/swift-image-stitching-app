name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/GigaPanSwift
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/GigaPanSwift
        run: |
          xcodebuild \
            -project GigaPanSwift.xcodeproj \
            -scheme GigaPanSwift \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
